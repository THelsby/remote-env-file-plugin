services:
  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins/Dockerfile
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_ADMIN_ID: admin
      JENKINS_ADMIN_PASSWORD: admin
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home

volumes:
  jenkins_home:
