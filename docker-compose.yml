services:
  env-fixture:
    image: nginx:1.27-alpine
    ports:
      - "8443:8443"
    volumes:
      - ./examples:/usr/share/nginx/html:ro
      - ./docker/fixture/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/fixture/certs:/etc/nginx/certs:ro

  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins/Dockerfile
    depends_on:
      - env-fixture
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_ADMIN_ID: admin
      JENKINS_ADMIN_PASSWORD: admin
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home

volumes:
  jenkins_home:
